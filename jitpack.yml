# The release workflow builds the AAR on a proper runner and attaches it (aar +
# pom + sources) to the GitHub Release. Here we just download those prebuilt
# assets and install them into the local Maven repo, which JitPack then serves
# as com.github.<owner>.<repo>:contour:<tag>.
jdk:
  - openjdk21

install:
  # Wrapped in a subshell so our `set` flags don't leak into JitPack's own
  # buildit.sh — a leaked `set -u` makes its later unset $AFTER_INSTALL_CMD
  # reference abort the build with "unbound variable".
  - |
    (
      set -eo pipefail
      # JitPack provides these per-build: GROUP=com.github.<owner>, ARTIFACT=<repo>,
      # VERSION=<tag>. The publication strips the leading v, so files are contour-<ver>.*.
      OWNER="${GROUP#com.github.}"
      VER="${VERSION#v}"
      BASE="https://github.com/$OWNER/$ARTIFACT/releases/download/$VERSION"
      curl -fsSL -o contour.aar "$BASE/contour-$VER.aar"
      curl -fsSL -o contour.pom "$BASE/contour-$VER.pom"
      curl -fsSL -o contour-sources.jar "$BASE/contour-$VER-sources.jar" || true
      SRC=""; [ -s contour-sources.jar ] && SRC="-Dsources=contour-sources.jar"
      mvn -q install:install-file -Dfile=contour.aar -DpomFile=contour.pom $SRC
    )
