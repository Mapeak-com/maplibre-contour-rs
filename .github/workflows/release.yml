name: Release

# Publishes consumable packages without using crates.io / Maven / CocoaPods:
#   - iOS:     a SwiftPM binaryTarget (xcframework zip) referenced by Package.swift
#   - Android: prebuilt jniLibs + Kotlin bindings, packaged by JitPack from the tag
#   - Rust:    a git dependency (see README)
#
# Releases the version in Cargo.toml when it changes on `main` (e.g. a merged
# bump PR), or on a manual run (the first release, or a retry). The `gate` job
# decides whether there's a new version to ship; the `release` job builds the
# artifacts, stamps Package.swift with this release's url+checksum, and tags it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        run: |
          version() { grep -m1 '^version = ' "$1" | sed -E 's/^version = "([^"]+)".*/\1/'; }
          ver=$(version Cargo.toml)
          tag="v$ver"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "$tag already exists; nothing to release."
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Manual release of $tag"
          elif [ "$ver" != "$(git show HEAD~1:Cargo.toml 2>/dev/null | grep -m1 '^version = ' | sed -E 's/^version = "([^"]+)".*/\1/' || echo '')" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Version changed to $ver; releasing $tag"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No version change; skipping."
          fi

  android:
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2

      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build .so per ABI
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 \
            -o artifacts/android/jniLibs build --release --features ffi

      - name: Generate Kotlin bindings
        run: |
          cargo build --release --features ffi
          cargo run --features uniffi-cli --bin uniffi-bindgen -- generate \
            --library target/release/libmaplibre_contour_rs.so \
            --language kotlin --out-dir artifacts/android/kotlin

      - name: Package
        run: |
          cd artifacts/android
          zip -r ../../maplibre-contour-rs-android.zip jniLibs kotlin

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: maplibre-contour-rs-android.zip

  ios:
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2

      - name: Add iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Build static libs
        run: |
          for t in aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios; do
            cargo build --release --features ffi --target "$t"
          done

      - name: Generate Swift bindings
        run: |
          cargo build --release --features ffi
          cargo run --features uniffi-cli --bin uniffi-bindgen -- generate \
            --library target/release/libmaplibre_contour_rs.dylib \
            --language swift --out-dir bindings/swift

      - name: Assemble xcframework
        run: |
          mkdir -p target/ios-sim headers out
          lipo -create \
            target/aarch64-apple-ios-sim/release/libmaplibre_contour_rs.a \
            target/x86_64-apple-ios/release/libmaplibre_contour_rs.a \
            -output target/ios-sim/libmaplibre_contour_rs.a
          # xcframework headers need a `module.modulemap` next to the C header.
          cp bindings/swift/maplibre_contour_rsFFI.h headers/
          cp bindings/swift/maplibre_contour_rsFFI.modulemap headers/module.modulemap
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libmaplibre_contour_rs.a -headers headers \
            -library target/ios-sim/libmaplibre_contour_rs.a -headers headers \
            -output out/MaplibreContour.xcframework
          ( cd out && zip -ry MaplibreContour.xcframework.zip MaplibreContour.xcframework && rm -rf MaplibreContour.xcframework )
          # The generated wrapper is committed onto the release tag by `release`.
          cp bindings/swift/maplibre_contour_rs.swift out/

      - uses: actions/upload-artifact@v7
        with:
          name: ios
          path: out

  release:
    needs: [gate, android, ios]
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Stamp Package.swift for this release
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          sum=$(sha256sum dist/MaplibreContour.xcframework.zip | awk '{print $1}')
          url="https://github.com/${{ github.repository }}/releases/download/$tag/MaplibreContour.xcframework.zip"
          perl -0777 -i -pe "s#url: \"[^\"]*\"#url: \"$url\"#" Package.swift
          perl -0777 -i -pe "s#checksum: \"[^\"]*\"#checksum: \"$sum\"#" Package.swift
          cp dist/maplibre_contour_rs.swift Sources/MaplibreContour/maplibre_contour_rs.swift

      - name: Tag release-ready commit
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Package.swift Sources/MaplibreContour/maplibre_contour_rs.swift
          git commit -m "release $tag"
          git tag "$tag"
          git push origin "$tag"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/MaplibreContour.xcframework.zip
            dist/maplibre-contour-rs-android.zip
