name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Rust core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  android:
    name: Android AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      - name: Install NDK
        run: sdkmanager --install "ndk;28.2.13676358"
      - name: Publish to Maven local
        working-directory: android
        run: ./gradlew :contour:publishToMavenLocal --no-daemon --stacktrace
      - uses: actions/upload-artifact@v7
        with:
          name: contour-aar
          path: android/contour/build/outputs/aar/*.aar

  ios:
    name: iOS XCFramework + SwiftPM
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build XCFramework + generate Swift bindings
        run: ./scripts/build-xcframework.sh
      - name: Check committed Swift bindings are up to date
        run: git diff --exit-code -- Sources/MaplibreContour/maplibre_contour_rs.swift
      - name: Build SwiftPM package
        run: swift build
