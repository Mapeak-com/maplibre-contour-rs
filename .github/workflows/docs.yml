name: Docs

# Publishes the rustdoc-generated API docs to GitHub Pages on every push to
# main. One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Redirect index to the crate root
        run: echo '<meta http-equiv="refresh" content="0; url=maplibre_contour_rs/">' > target/doc/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
